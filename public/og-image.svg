<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- خلفية متدرجة فاخرة -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="50%"  stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1c1400"/>
    </linearGradient>
    <!-- توهج ذهبي مركزي -->
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#b8962e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b8962e" stop-opacity="0"/>
    </radialGradient>
    <!-- ظل النص -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#b8962e" flood-opacity="0.5"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- خلفية -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- خطوط زخرفية ذهبية يمين -->
  <line x1="80" y1="40"  x2="80"  y2="590" stroke="#b8962e" stroke-width="1.5" opacity="0.25"/>
  <line x1="95" y1="80"  x2="95"  y2="550" stroke="#b8962e" stroke-width="0.7" opacity="0.15"/>
  <!-- خطوط زخرفية ذهبية يسار -->
  <line x1="1120" y1="40"  x2="1120" y2="590" stroke="#b8962e" stroke-width="1.5" opacity="0.25"/>
  <line x1="1105" y1="80"  x2="1105" y2="550" stroke="#b8962e" stroke-width="0.7" opacity="0.15"/>
  <!-- خطوط أفقية زخرفية -->
  <line x1="80" y1="40"   x2="1120" y2="40"   stroke="#b8962e" stroke-width="1.5" opacity="0.25"/>
  <line x1="80" y1="590"  x2="1120" y2="590"  stroke="#b8962e" stroke-width="1.5" opacity="0.25"/>

  <!-- خط ذهبي علوي -->
  <rect x="0" y="0" width="1200" height="5" fill="#b8962e" opacity="0.9"/>
  <!-- خط ذهبي سفلي -->
  <rect x="0" y="625" width="1200" height="5" fill="#b8962e" opacity="0.9"/>

  <!-- أيقونة خزانة SVG مبسطة (يمين الصورة) -->
  <g transform="translate(820, 140)" opacity="0.12">
    <rect x="0"   y="0"   width="280" height="350" rx="12" fill="none" stroke="#b8962e" stroke-width="6"/>
    <line x1="140" y1="0"   x2="140" y2="350" stroke="#b8962e" stroke-width="4"/>
    <line x1="0"   y1="175" x2="280" y2="175" stroke="#b8962e" stroke-width="3"/>
    <circle cx="105" cy="87"  r="10" fill="#b8962e"/>
    <circle cx="175" cy="87"  r="10" fill="#b8962e"/>
    <circle cx="105" cy="262" r="10" fill="#b8962e"/>
    <circle cx="175" cy="262" r="10" fill="#b8962e"/>
    <rect x="20"  y="20"  width="240" height="135" rx="6" fill="none" stroke="#b8962e" stroke-width="2" opacity="0.5"/>
    <rect x="20"  y="195" width="240" height="135" rx="6" fill="none" stroke="#b8962e" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- شعار الشركة (نص عربي كبير) -->
  <text
    x="600" y="240"
    font-family="Cairo, Tajawal, Arial, sans-serif"
    font-size="88"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    filter="url(#textShadow)"
  >خبراء الخزائن</text>

  <!-- خط ذهبي فاصل تحت الاسم -->
  <g transform="translate(600, 270)">
    <rect x="-180" y="0" width="80"  height="3" rx="2" fill="#b8962e"/>
    <rect x="-20"  y="0" width="40"  height="3" rx="2" fill="#f59e0b"/>
    <rect x="100"  y="0" width="80"  height="3" rx="2" fill="#b8962e"/>
  </g>

  <!-- الشعار الفرعي -->
  <text
    x="600" y="340"
    font-family="Cairo, Tajawal, Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#d4a832"
    text-anchor="middle"
  >تصميم وتصنيع خزائن ملابس فاخرة بالرياض</text>

  <!-- مربعات المميزات الثلاث -->
  <!-- مربع 1 -->
  <g transform="translate(175, 400)">
    <rect x="-120" y="0" width="240" height="80" rx="12"
          fill="#b8962e" fill-opacity="0.12"
          stroke="#b8962e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="30" font-family="Cairo,Arial,sans-serif" font-size="22"
          font-weight="700" fill="#f59e0b" text-anchor="middle">✓ قياس مجاني</text>
    <text x="0" y="58" font-family="Cairo,Arial,sans-serif" font-size="16"
          fill="#94a3b8" text-anchor="middle">نأتي إليك أينما كنت</text>
  </g>
  <!-- مربع 2 -->
  <g transform="translate(600, 400)">
    <rect x="-120" y="0" width="240" height="80" rx="12"
          fill="#b8962e" fill-opacity="0.12"
          stroke="#b8962e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="30" font-family="Cairo,Arial,sans-serif" font-size="22"
          font-weight="700" fill="#f59e0b" text-anchor="middle">✓ ضمان 10 سنوات</text>
    <text x="0" y="58" font-family="Cairo,Arial,sans-serif" font-size="16"
          fill="#94a3b8" text-anchor="middle">على جميع منتجاتنا</text>
  </g>
  <!-- مربع 3 -->
  <g transform="translate(1025, 400)">
    <rect x="-120" y="0" width="240" height="80" rx="12"
          fill="#b8962e" fill-opacity="0.12"
          stroke="#b8962e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="30" font-family="Cairo,Arial,sans-serif" font-size="22"
          font-weight="700" fill="#f59e0b" text-anchor="middle">✓ منذ 2015</text>
    <text x="0" y="58" font-family="Cairo,Arial,sans-serif" font-size="16"
          fill="#94a3b8" text-anchor="middle">خبرة تجاوزت 10 سنوات</text>
  </g>

  <!-- الموقع الإلكتروني أسفل الصورة -->
  <text
    x="600" y="600"
    font-family="Cairo, Tajawal, Arial, sans-serif"
    font-size="20"
    fill="#64748b"
    text-anchor="middle"
  >www.theclosetexperts.com  |  واتساب: 966503167122</text>
</svg>
